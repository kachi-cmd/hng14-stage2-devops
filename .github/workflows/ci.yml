name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint API with flake8
        run: flake8 api/ --max-line-length=120 --exclude=__pycache__

      - name: Lint worker with flake8
        run: flake8 worker/ --max-line-length=120 --exclude=__pycache__

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install eslint
        run: npm install -g eslint@8

      - name: Create eslint config
        run: |
          cat > frontend/.eslintrc.json << 'EOF'
          {
            "env": { "node": true, "es2021": true, "browser": true },
            "extends": "eslint:recommended",
            "parserOptions": { "ecmaVersion": 2021 }
          }
          EOF

      - name: Lint frontend with eslint
        run: eslint frontend/app.js --max-warnings=0

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          ignore: DL3008

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
          ignore: DL3008

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          ignore: DL3008

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies and test tools
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov fakeredis httpx

      - name: Create test directory and test file
        run: |
          mkdir -p api/tests
          touch api/tests/__init__.py
          cat > api/tests/test_api.py << 'EOF'
          import pytest
          import fakeredis
          import main
          from fastapi.testclient import TestClient

          @pytest.fixture(autouse=True)
          def fake_redis(monkeypatch):
              server = fakeredis.FakeServer()
              fake = fakeredis.FakeRedis(server=server)
              monkeypatch.setattr(main, "r", fake)
              yield fake

          @pytest.fixture
          def client():
              return TestClient(main.app)

          def test_health_endpoint(client):
              response = client.get("/health")
              assert response.status_code == 200
              assert response.json() == {"status": "ok"}

          def test_create_job_returns_job_id(client):
              response = client.post("/jobs")
              assert response.status_code == 200
              data = response.json()
              assert "job_id" in data
              assert len(data["job_id"]) == 36

          def test_create_job_pushes_to_correct_queue(client, fake_redis):
              client.post("/jobs")
              assert fake_redis.llen("jobs") == 1

          def test_create_job_sets_queued_status(client, fake_redis):
              response = client.post("/jobs")
              job_id = response.json()["job_id"]
              status = fake_redis.hget(f"job:{job_id}", "status")
              assert status is not None
              assert status.decode() == "queued"

          def test_get_job_status(client, fake_redis):
              post_response = client.post("/jobs")
              job_id = post_response.json()["job_id"]
              get_response = client.get(f"/jobs/{job_id}")
              assert get_response.status_code == 200
              data = get_response.json()
              assert data["job_id"] == job_id
              assert data["status"] == "queued"

          def test_get_nonexistent_job(client):
              response = client.get("/jobs/00000000-0000-0000-0000-000000000000")
              assert response.status_code == 200
              assert "error" in response.json()
          EOF

      - name: Run tests with coverage
        run: |
          cd api
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ..

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/hng-api:${{ steps.meta.outputs.tag }}
            localhost:5000/hng-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/hng-worker:${{ steps.meta.outputs.tag }}
            localhost:5000/hng-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/hng-frontend:${{ steps.meta.outputs.tag }}
            localhost:5000/hng-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images are in registry
        run: |
          curl -s http://localhost:5000/v2/_catalog | grep -q "hng-api"
          curl -s http://localhost:5000/v2/_catalog | grep -q "hng-worker"
          curl -s http://localhost:5000/v2/_catalog | grep -q "hng-frontend"
          echo "All three images confirmed in registry"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t hng-api:latest ./api
          docker build -t hng-worker:latest ./worker
          docker build -t hng-frontend:latest ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.70.0

      - name: Show CRITICAL findings in table format
        run: |
          echo "=== API image ==="
          trivy image --severity CRITICAL --format table --no-progress hng-api:latest || true
          echo "=== Worker image ==="
          trivy image --severity CRITICAL --format table --no-progress hng-worker:latest || true
          echo "=== Frontend image ==="
          trivy image --severity CRITICAL --format table --no-progress hng-frontend:latest || true

      - name: Scan API image (SARIF)
        run: |
          trivy image \
            --severity CRITICAL \
            --format sarif \
            --output trivy-api.sarif \
            --exit-code 1 \
            --no-progress \
            hng-api:latest

      - name: Scan worker image (SARIF)
        run: |
          trivy image \
            --severity CRITICAL \
            --format sarif \
            --output trivy-worker.sarif \
            --exit-code 1 \
            --no-progress \
            hng-worker:latest

      - name: Scan frontend image (SARIF)
        run: |
          trivy image \
            --severity CRITICAL \
            --format sarif \
            --output trivy-frontend.sarif \
            --exit-code 1 \
            --no-progress \
            hng-frontend:latest

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif
          retention-days: 7

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for compose
        run: cp .env.example .env

      - name: Build and start full stack
        run: docker compose up --build -d --wait
        timeout-minutes: 5

      - name: Confirm all services are healthy
        run: docker compose ps

      - name: Submit a job and poll until completed
        run: |
          echo "Submitting job..."
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"

          JOB_ID=$(echo $RESPONSE | grep -o '"job_id":"[^"]*"' | cut -d'"' -f4)
          echo "Job ID: $JOB_ID"

          if [ -z "$JOB_ID" ]; then
            echo "ERROR: No job_id in response"
            exit 1
          fi

          echo "Polling for completion..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | \
              grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i: status = $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "SUCCESS: Job $JOB_ID completed"
              exit 0
            fi

            if [ "$STATUS" = "failed" ]; then
              echo "FAILURE: Job $JOB_ID failed"
              exit 1
            fi

            sleep 2
          done

          echo "TIMEOUT: Job did not complete within 60 seconds"
          exit 1

      - name: Tear down stack (always runs)
        if: always()
        run: docker compose down -v --remove-orphans

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for compose
        run: cp .env.example .env

      - name: Build images for deploy
        run: |
          SHA=${{ github.sha }}
          docker build -t hng-api:$SHA -t hng-api:latest ./api
          docker build -t hng-worker:$SHA -t hng-worker:latest ./worker
          docker build -t hng-frontend:$SHA -t hng-frontend:latest ./frontend

      - name: Start initial stack (simulates existing production)
        run: docker compose up -d --wait
        timeout-minutes: 3

      - name: Perform rolling update
        run: |
          SHA=${{ github.sha }}
          NETWORK=$(docker network ls --filter name=app-net --format "{{.Name}}" | head -1)
          echo "Using network: $NETWORK"
          echo "Starting rolling update for API (sha: $SHA)..."

          docker run -d \
            --name api_new \
            --network $NETWORK \
            -e REDIS_HOST=redis \
            -e REDIS_PORT=6379 \
            hng-api:$SHA

          echo "Waiting up to 60s for new container to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' api_new 2>/dev/null || echo "starting")
            echo "  attempt $i/12: $STATUS"

            if [ "$STATUS" = "healthy" ]; then
              echo "Healthy — cutting over to new container"
              docker compose stop api
              docker compose rm -f api
              docker rename api_new api_prod
              echo "Rolling update complete — new container is api_prod"
              exit 0
            fi

            sleep 5
          done

          echo "ABORT: new container not healthy within 60s — old container untouched"
          docker stop api_new && docker rm api_new
          exit 1

      - name: Verify post-deploy health
        run: |
          sleep 3
          echo "=== All running containers ==="
          docker ps --format "table {{.Names}}	{{.Status}}	{{.Ports}}"

          echo "=== Confirming new API container is healthy ==="
          docker inspect --format="Name: {{.Name}} | Health: {{.State.Health.Status}}" api_prod

          echo "=== Hitting API health endpoint directly ==="
          API_IP=$(docker inspect -f "{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}" api_prod)
          echo "API IP: $API_IP"
          curl -sf http://$API_IP:8000/health | grep "ok"

          echo "Post-deploy verification passed"

      - name: Tear down runner environment
        if: always()
        run: docker compose down -v --remove-orphans
